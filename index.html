<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo das Sílabas - Versão Blindada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --bg: #f0f3f7; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #card { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .img-box { background: #eee; height: 150px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        img { max-width: 120px; max-height: 120px; }
        #sortable-list { display: flex; justify-content: center; gap: 10px; padding: 15px 0; list-style: none; min-height: 50px; }
        .silaba { background: var(--p); color: white; padding: 15px 20px; border-radius: 10px; cursor: move; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 0 #4834d4; }
        button { background: var(--s); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        #msg { margin: 10px 0; font-weight: bold; color: #d63031; }
    </style>
</head>
<body>

<div id="card">
    <div id="debug" style="font-size: 10px; color: red;"></div>
    <div class="img-box"><img id="pic" src="" alt="Cargando..."></div>
    <ul id="sortable-list"></ul>
    <div id="msg"></div>
    <button onclick="check()">VERIFICAR</button>
</div>

<script>
    const words = [
        { id: 1, s: ["BO", "LA"], i: "https://cdn-icons-png.flaticon.com/512/3041/3041183.png" },
        { id: 2, s: ["GA", "TO"], i: "https://cdn-icons-png.flaticon.com/512/616/616408.png" },
        { id: 3, s: ["PI", "A", "NO"], i: "https://cdn-icons-png.flaticon.com/512/3233/3233513.png" }
    ];

    let current;

    function start() {
        try {
            const list = document.getElementById('sortable-list');
            const pic = document.getElementById('pic');
            
            // Escolher palavra
            current = words[Math.floor(Math.random() * words.length)];
            pic.src = current.i;
            
            // Embaralhar
            let mix = [...current.s].sort(() => Math.random() - 0.5);
            
            list.innerHTML = "";
            mix.forEach(txt => {
                const li = document.createElement('li');
                li.className = 'silaba';
                li.innerText = txt;
                list.appendChild(li);
            });

            // Ativar Arrastar apenas se a biblioteca carregou
            if (typeof Sortable !== 'undefined') {
                new Sortable(list, { animation: 150 });
            } else {
                document.getElementById('debug').innerText = "Aviso: Modo de toque limitado (Sortable offline)";
            }
        } catch (e) {
            document.getElementById('debug').innerText = "Erro: " + e.message;
        }
    }

    function check() {
        const items = Array.from(document.getElementById('sortable-list').children);
        const user = items.map(li => li.innerText).join('');
        const correct = current.s.join('');

        if (user === correct) {
            document.getElementById('msg').style.color = "green";
            document.getElementById('msg').innerText = "Correto! 🎉";
            setTimeout(() => { document.getElementById('msg').innerText = ""; start(); }, 1500);
        } else {
            document.getElementById('msg').style.color = "red";
            document.getElementById('msg').innerText = "Tenta de novo! ❌";
        }
    }

    // Tentar iniciar
    window.onload = start;
</script>
</body>
</html>
