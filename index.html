<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo das Sílabas - Memória Ativa</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #e0f2f1; padding: 20px; }
        #game-container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .image-box { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 140px; border-radius: 15px; }
        #sortable-list { display: flex; justify-content: center; gap: 10px; padding: 15px; list-style: none; background: #f0f0f0; border-radius: 10px; min-height: 60px; }
        .silaba { background: #ff9800; color: white; padding: 15px; border-radius: 10px; cursor: grab; font-weight: bold; font-size: 1.3rem; box-shadow: 0 4px 0 #e65100; }
        button { margin-top: 20px; width: 100%; padding: 15px; font-size: 1.2rem; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 10px; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="image-box"><img id="imagem-palavra" src=""></div>
    <ul id="sortable-list"></ul>
    <div id="feedback"></div>
    <button onclick="verificarResposta()">VERIFICAR ✅</button>
</div>

<script>
    const bancoDePalavras = [
        { id: 1, silabas: ["BO", "NE", "CA"], img: "https://images.unsplash.com/photo-1558023784-f8343393cb06?w=200" },
        { id: 2, silabas: ["GA", "TO"], img: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=200" },
        { id: 3, silabas: ["PI", "PO", "CA"], img: "https://images.unsplash.com/photo-1578849278619-e73505e9610f?w=200" },
        { id: 4, silabas: ["MA", "ÇÃ"], img: "https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=200" }
    ];

    let palavraAtual;
    const listaUI = document.getElementById('sortable-list');
    const feedbackUI = document.getElementById('feedback');

    function carregarEstadoOuNovo() {
        const salvo = localStorage.getItem('jogo_silabas_progresso');
        
        if (salvo) {
            const dados = JSON.parse(salvo);
            palavraAtual = bancoDePalavras.find(p => p.id === dados.idPalavra);
            montarInterface(dados.ordemSilabas);
        } else {
            gerarNovaPalavra();
        }
    }

    function gerarNovaPalavra() {
        palavraAtual = bancoDePalavras[Math.floor(Math.random() * bancoDePalavras.length)];
        let embaralhadas;
        do {
            embaralhadas = [...palavraAtual.silabas].sort(() => Math.random() - 0.5);
        } while (embaralhadas.join('') === palavraAtual.silabas.join(''));

        salvarProgresso(embaralhadas);
        montarInterface(embaralhadas);
    }

    function salvarProgresso(ordem) {
        const estado = {
            idPalavra: palavraAtual.id,
            ordemSilabas: ordem
        };
        localStorage.setItem('jogo_silabas_progresso', JSON.stringify(estado));
    }

    function montarInterface(silabas) {
        document.getElementById('imagem-palavra').src = palavraAtual.img;
        listaUI.innerHTML = "";
        silabas.forEach(s => {
            let li = document.createElement('li');
            li.className = 'silaba';
            li.innerText = s;
            listaUI.appendChild(li);
        });

        new Sortable(listaUI, { 
            animation: 150,
            onEnd: () => {
                // Se o utilizador mover as sílabas, guardamos a nova posição
                const novaOrdem = Array.from(listaUI.children).map(li => li.innerText);
                salvarProgresso(novaOrdem);
            }
        });
    }

    function verificarResposta() {
        const ordemAtual = Array.from(listaUI.children).map(li => li.innerText);
        if (ordemAtual.join('') === palavraAtual.silabas.join('')) {
            feedbackUI.style.color = "green";
            feedbackUI.innerText = "Correto! A carregar próxima...";
            localStorage.removeItem('jogo_silabas_progresso'); // Limpa para a próxima ser nova
            setTimeout(gerarNovaPalavra, 2000);
        } else {
            feedbackUI.style.color = "red";
            feedbackUI.innerText = "Tenta outra vez!";
        }
    }

    window.onload = carregarEstadoOuNovo;
</script>
</body>
</html>
