<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo de Sílabas</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .container { max-width: 600px; margin: auto; }
    img { width: 200px; height: 200px; object-fit: cover; }
    .silabas { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .silaba { padding: 10px 15px; background: #eee; border: 1px solid #ccc; cursor: grab; }
    .dropzone { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .slot { width: 60px; height: 40px; border: 2px dashed #ccc; }
    .feedback { font-size: 20px; margin-top: 20px; }
    button { margin-top: 20px; padding: 10px 20px; }
  </style>
</head>
<body>
<div class="container">
  <h2>Ordena as Sílabas</h2>
  <img id="imagem" src="" alt="imagem">
  
  <div class="silabas" id="silabas"></div>
  <div class="dropzone" id="dropzone"></div>

  <div class="feedback" id="feedback"></div>
  <button onclick="verificar()">Verificar</button>
</
