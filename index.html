<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Jogo das Sílabas</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --error: #d63031; --bg: #f0f3f7; --star: #f1c40f; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        #game-card { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; transition: transform 0.3s ease; }
        
        /* Sistema de Estrelas */
        #stars-container { font-size: 1.5rem; color: #ccc; margin-bottom: 15px; }
        .star.active { color: var(--star); animation: starPop 0.3s ease; }

        .img-container { background: #f9f9f9; border-radius: 20px; padding: 20px; margin-bottom: 20px; height: 160px; display: flex; align-items: center; justify-content: center; border: 2px solid #eee; }
        img { max-width: 140px; max-height: 140px; object-fit: contain; transition: transform 0.3s ease; }

        #sortable-list { display: flex; justify-content: center; gap: 12px; padding: 20px 0; list-style: none; min-height: 80px; }
        
        .silaba { 
            background: var(--primary); color: white; padding: 18px 25px; border-radius: 15px; 
            cursor: grab; font-weight: bold; font-size: 1.5rem; text-transform: uppercase;
            box-shadow: 0 6px 0 #4834d4; transition: transform 0.1s, box-shadow 0.1s;
            user-select: none; -webkit-user-select: none;
        }
        .silaba:active { transform: translateY(4px); box-shadow: 0 2px 0 #4834d4; }
        
        /* Class for sortable ghost */
        .sortable-ghost { opacity: 0.3; }

        .btn-check { 
            background: var(--success); color: white; border: none; width: 100%; padding: 18px; 
            border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px;
            box-shadow: 0 5px 0 #009475; transition: all 0.1s;
        }
