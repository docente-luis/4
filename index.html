<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Sílabas - 10 Desafios</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; padding: 10px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 500px; width: 100%; border: 4px solid #4a90e2; }
        .progresso { color: #4a90e2; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .imagem-container { position: relative; margin-bottom: 20px; height: 180px; display: flex; justify-content: center; align-items: center; background: #f8fafc; border-radius: 20px; }
        img { max-height: 150px; max-width: 100%; border-radius: 15px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .feedback-visual { position: absolute; font-size: 6rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 10; }
        
        .caixa-silabas { 
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; min-height: 80px; padding: 20px;
            border: 3px dashed #cbd5e0; border-radius: 20px; background: white;
        }
        .silaba { 
            padding: 15px 22px; background: #4a90e2; color: white; font-weight: bold; 
            font-size: 1.5rem; border-radius: 15px; cursor: grab; user-select: none;
            box-shadow: 0 5px 0 #2b6cb0; margin: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .acertou img { transform: scale(0.8) rotate(-5deg); filter: grayscale(100%); opacity: 0.3; }
        .acertou .feedback-visual { opacity: 1; color: #48bb78; transform: scale(1.1); text-shadow: 0 0 20px rgba(72,187,120,0.4); }
        .silaba.correto { background-color: #48bb78; box-shadow: 0 5px 0 #2f855a; animation: pisca 0.5s ease infinite alternate; }
        
        @keyframes pisca {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #btn-proximo { 
            display: none; margin-top: 25px; padding: 18px 45px; background: #48bb78; 
            color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 1.3rem; font-weight: bold;
            box-shadow: 0 6px 0 #2f855a; transition: 0.2s;
        }
