<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Jogo das Sílabas - 10 Palavras</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --err: #d63031; --star: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f3f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        #card { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 25px; text-align: center; box-shadow: 0 12px 24px rgba(0,0,0,0.1); position: relative; }
        
        #stars { font-size: 1.2rem; color: #ddd; margin-bottom: 10px; }
        .active-star { color: var(--star) !important; text-shadow: 0 0 5px rgba(241, 196, 15, 0.5); }

        .emoji-box { font-size: 80px; background: #f8f9fa; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 2px solid #eee; }

        #sortable-list { display: flex; justify-content: center; gap: 10px; padding: 15px 0; list-style: none; min-height: 60px; }
        .silaba { 
            background: var(--p); color: white; padding: 15px 20px; border-radius: 12px; 
            cursor: grab; font-weight: bold; font-size: 1.4rem; box-shadow: 0 5px 0 #4834d4;
            user-select: none; -webkit-user-select: none;
        }
        .silaba:active { transform: translateY(3px); box-shadow: 0 2px 0 #4834d4; }

        button { 
            background: var(--s); color: white; border: none; width: 100%; padding: 18px; 
            border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px;
            box-shadow: 0 5px 0 #008a6e;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #008a6e; }

        #msg { margin-top: 15px; font-weight: bold; min-height: 1.5em; font-size: 1.1rem; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

<div id="card">
    <div id="stars">★★★★★</div>
    <div class="emoji-box" id="emoji-display"></div>
    <ul id="sortable-list"></ul>
    <div id="msg"></div>
    <button onclick="verificar()">VERIFICAR ✅</button>
</div>

<script>
    // LISTA DE 10 PALAVRAS
    const banco = [
        { s: ["CA", "VA", "LO"], e: "🐎" },
        { s: ["GA", "TO"], e: "🐱" },
        { s: ["MA", "CA", "CO"], e: "🐒" },
        { s: ["PI", "PO", "CA"], e: "🍿" },
        { s: ["JA", "RE"], e: "🌳" }, // Jacaré simplificado ou trocado por Árvore
        { s: ["ME", "SA"], e: "🪑" },
        { s: ["BA", "NA", "NA"], e: "🍌" },
        { s: ["PA", "TO"], e: "🦆" },
        { s: ["CO", "RE", "LO"], e: "🐰" }, // Coelho (simplificado para estudo: Co-re-lo/Co-e-lho)
        { s: ["BI", "CI", "CLE", "TA"], e: "🚲" }
    ];

    // Para evitar erros de alfabetização, vamos ajustar as difíceis:
    const listaFinal = [
        { s: ["CA", "VA", "LO"], e: "🐎" },
        { s: ["GA", "TO"], e: "🐱" },
        { s: ["MA", "CA", "CO"], e: "🐒" },
        { s: ["PI", "PO", "CA"], e: "🍿" },
        { s: ["BO", "NE", "CA"], e: "🪆" },
        { s: ["ME", "SA"], e: "🪑" },
        { s: ["BA", "NA", "NA"], e: "🍌" },
        { s: ["PA", "TO"], e: "🦆" },
        { s: ["GE", "LA", "DO"], e: "🍦" },
        { s: ["CA", "NE", "TA"], e: "🖊️" }
    ];

    let atual;
    let acertos = 0;

    function jogar() {
        const msg = document.getElementById('msg');
        msg.innerText = "";
        
        // Escolhe palavra aleatória
        atual = listaFinal[Math.floor(Math.random() * listaFinal.length)];
        document.getElementById('emoji-display').innerText = atual.e;
        
        // Embaralha
        let misturado;
        do {
            misturado = [...atual.s].sort(() => Math.random() - 0.5);
        } while (misturado.join('') === atual.s.join(''));

        const listaUI = document.getElementById('sortable-list');
        listaUI.innerHTML = "";
        misturado.forEach(sil => {
            const li = document.createElement('li');
            li.className = 'silaba';
            li.innerText = sil;
            listaUI.appendChild(li);
        });

        if (typeof Sortable !== 'undefined') {
            new Sortable(listaUI, { animation: 150 });
        }
    }

    function verificar() {
        const ordem = Array.from(document.getElementById('sortable-list').children).map(li => li.innerText).join('');
        const correta = atual.s.join('');
        const msg = document.getElementById('msg');
        const card = document.getElementById('card');

        if (ordem === correta) {
            msg.style.color = "var(--s)";
            msg.innerText = "Muito bem! ✨";
            acertos++;
            atualizarEstrelas();
            setTimeout(jogar, 1500);
        } else {
            msg.style.color = "var(--err)";
            msg.innerText = "Tenta outra vez! 🤔";
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 300);
        }
    }

    function atualizarEstrelas() {
        const starsUI = document.getElementById('stars');
        let str = "";
        for(let i=0; i<5; i++) {
            if(i < (acertos % 6)) str += "<span class='active-star'>★</span>";
            else str += "★";
        }
        starsUI.innerHTML = str;
    }

    window.onload = jogar;
</script>

</body>
</html>
